name: A Bit Less Clanker Build

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet
        run: nuget restore FastFirewallSolution.sln

      - name: Build
        run: msbuild FastFirewallSolution.sln /p:Configuration=Release

      - name: Locate EXE
        id: find_exe
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Recurse -Filter "${{ github.event.repository.name }}.exe" |
                 Where-Object { $_.FullName -like "*bin\Release*" } |
                 Select-Object -First 1

          if (-not $exe) { throw "EXE not found" }

          echo "path=$($exe.FullName)" >> $env:GITHUB_OUTPUT

      - name: Extract Version
        id: version
        shell: pwsh
        run: |
          $csproj = Get-ChildItem -Recurse -Filter "*.csproj" | Select-Object -First 1
          $version = ([xml](Get-Content $csproj)).Project.PropertyGroup.Version.Trim()

          if (-not $version) { throw "Version not found" }

          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: VirusTotal Scan
        id: vt
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: ${{ steps.find_exe.outputs.path }}

      - name: Create or Update Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "v${{ steps.version.outputs.version }}"
          $exe = "${{ steps.find_exe.outputs.path }}"
          $notes = "${{ steps.vt.outputs.analysis }}"

          $exists = gh release view $tag 2>$null

          if ($LASTEXITCODE -eq 0) {
            echo "Release exists, updating..."
            gh release upload $tag $exe --clobber
            gh release edit $tag --notes $notes
          }
          else {
            echo "Creating new release..."
            gh release create $tag $exe `
              --title "Release $tag" `
              --notes $notes
          }